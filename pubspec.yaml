homepage: https://github.com/bahung1221/dart-vector-tile
documentation: https://github.com/bahung1221/dart-vector-tile
environment:
  sdk: '>=3.8.1 <4.0.0'
dependencies:
  fixnum: ^1.1.1
  protobuf: ^6.0.0
dev_dependencies:
  lints: ^6.0.0
  build_runner: ^2.0.0  # Build tool runner
  protoc_plugin: ^25.0.0
  protoc_builder: any
